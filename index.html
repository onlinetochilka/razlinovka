<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Точилка | Генератор разлиновки</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/onlinetochilka/theme@main/tochilka-theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/onlinetochilka/theme@main/tochilka-gear.css">

    <style>
        /* --- Специфичные структурные стили для инструмента --- */
        .header { text-align: center; margin-bottom: 40px; }
        .subtitle { font-size: 1.1rem; opacity: 0.8; }

        .brand-gear {
            height: 0.9em; 
            width: auto;
            vertical-align: middle; 
            margin: 0 6px 4px 0; 
        }

        .layout-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 40px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .layout-container { grid-template-columns: 1fr; }
        }

        .settings-panel { padding: 32px; position: sticky; top: 40px; }
        .setting-group { margin-bottom: 24px; transition: opacity 0.3s ease; }
        .setting-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .setting-row .setting-group { margin-bottom: 0; }
        
        label { display: block; font-weight: 600; margin-bottom: 12px; font-size: 0.95rem; }
        .val-badge { float: right; font-weight: 700; opacity: 0.7; font-variant-numeric: tabular-nums; }

        select.neumo-input, input[type="number"].neumo-input {
            width: 100%; padding: 12px 16px;
        }

        input[type="range"] {
            width: 100%; height: 6px; 
            border-radius: 4px; outline: none; -webkit-appearance: none;
            margin-top: 10px; background: #CBD5E1;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            background: #1A237E; border-radius: 50%;
            cursor: pointer; transition: transform 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }
        input[type="range"]:disabled::-webkit-slider-thumb { background: #94A3B8; cursor: not-allowed; }

        .margins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .margin-input { display: flex; align-items: center; gap: 10px; }
        .margin-input span { font-size: 0.85rem; font-weight: 600; width: 50px; }

        .action-buttons { 
            display: flex; gap: 12px; margin-top: 24px; align-items: stretch; width: 100%; box-sizing: border-box; 
        }
        .save-menu-wrapper { position: relative; flex: 1; min-width: 0; }
        .btn-print-main { flex: 1; min-width: 0; margin-top: 0; }
        
        .btn-action { 
            width: 100%; height: 100%; display: flex; align-items: center; 
            justify-content: center; gap: 6px; font-weight: 700; font-size: 0.9rem; 
            cursor: pointer; border: none; white-space: nowrap;
            padding: 16px 4px !important; 
        }
        .btn-action svg { width: 18px; height: 18px; flex-shrink: 0; }
        .btn-save-style { background: #1A237E; color: #FFF; }
        
        .save-dropdown {
            display: none; position: absolute; bottom: calc(100% + 10px); left: 0; 
            width: 100%; padding: 8px; z-index: 100;
        }
        .dropdown-item {
            width: 100%; padding: 12px; background: transparent; 
            border: none; border-radius: 8px; cursor: pointer; 
            font-weight: 600; font-family: inherit; font-size: 0.95rem; 
            text-align: left; transition: background 0.2s; color: inherit;
        }
        .dropdown-item:hover { background: rgba(26, 35, 126, 0.05); }

        .preview-panel {
            padding: 40px; display: flex; justify-content: center; align-items: flex-start;
            overflow-x: auto;
        }
        
        /* Устранение фантомных отступов и скроллов */
        .preview-sheet { 
            background: #FFFFFF; 
            position: relative; 
            transition: all 0.3s ease; 
            overflow: hidden; 
            display: flex; 
        }
        .preview-sheet svg { 
            display: block; 
        }

        @media print {
            body { background: none; padding: 0; margin: 0; }
            .header, .settings-panel { display: none !important; }
            .layout-container { display: block; max-width: none; gap: 0; margin: 0; }
            .preview-panel { padding: 0; background: none; border: none; box-shadow: none; overflow: visible; }
            .preview-sheet { box-shadow: none; border: none; overflow: hidden; }
        }
    </style>
</head>
<body class="tochilka-theme">

    <div class="header no-print">
        <h1>
            <img src="https://cdn.jsdelivr.net/gh/onlinetochilka/theme@main/tochilka-logo.svg" class="brand-gear" alt="Логотип">Генератор разлиновки
        </h1>
        <p class="subtitle">Идеально точные рабочие листы в миллиметрах. Всё сходится.</p>
    </div>

    <div class="layout-container">
        
        <aside class="settings-panel no-print neumo-card">
            
            <div class="setting-row">
                <div class="setting-group">
                    <label for="paperSize">Формат бумаги</label>
                    <select id="paperSize" class="neumo-input">
                        <option value="A4" data-w="210" data-h="297">A4 (210×297)</option>
                        <option value="A5" data-w="148.5" data-h="210">A5 (148×210)</option>
                        <option value="A3" data-w="297" data-h="420">A3 (297×420)</option>
                        <option value="Letter" data-w="215.9" data-h="279.4">Letter</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="paperOrientation">Ориентация</label>
                    <select id="paperOrientation" class="neumo-input">
                        <option value="portrait">Книжная</option>
                        <option value="landscape">Альбомная</option>
                    </select>
                </div>
            </div>

            <div class="setting-group">
                <label for="gridType">Тип сетки</label>
                <select id="gridType" class="neumo-input">
                    <option value="square">Клетка (Стандартная)</option>
                    <option value="millimeter">Миллиметровка (ГОСТ)</option>
                    <option value="wide">Широкая линейка</option>
                    <option value="narrow">Узкая линейка</option>
                    <option value="slanted">Косая линейка</option>
                    <option value="frequent">Частая косая линейка</option>
                    <option value="isometric">Изометрическая (Треугольники)</option>
                    <option value="dots">Точечная сетка (Dot grid)</option>
                </select>
            </div>

            <div class="setting-group" id="sizeGroup">
                <label for="gridSize">Шаг сетки <span class="val-badge" id="sizeVal">8 мм</span></label>
                <input type="range" id="gridSize" min="2" max="20" step="0.5" value="8">
            </div>

            <div class="setting-group">
                <label>Поля (в миллиметрах)</label>
                <div class="margins-grid">
                    <div class="margin-input"><span>ВЕРХ</span><input type="number" id="marginTop" class="neumo-input" value="15" min="0" max="100"></div>
                    <div class="margin-input"><span>НИЗ</span><input type="number" id="marginBottom" class="neumo-input" value="15" min="0" max="100"></div>
                    <div class="margin-input"><span>ЛЕВО</span><input type="number" id="marginLeft" class="neumo-input" value="20" min="0" max="100"></div>
                    <div class="margin-input"><span>ПРАВО</span><input type="number" id="marginRight" class="neumo-input" value="10" min="0" max="100"></div>
                </div>
            </div>

            <div class="setting-row">
                <div class="setting-group">
                    <label for="customColor">Цвет <span class="val-badge" id="colorValBadge">#94a3b8</span></label>
                    <div style="display: flex; gap: 8px;">
                        <input type="color" id="customColor" value="#94a3b8" class="neumo-input" style="width: 48px; padding: 2px; cursor: pointer;" title="Выбрать свой цвет">
                        <select id="lineColorSelect" class="neumo-input" style="flex: 1;">
                            <option value="#94a3b8">Классический серый</option>
                            <option value="#93c5fd">Нежно-синий</option>
                            <option value="#64748b">Темно-серый</option>
                            <option value="#e2e8f0">Очень светлый</option>
                            <option value="#f87171">Инженерный красный</option>
                            <option value="#34d399">Мятно-зеленый</option>
                            <option value="" hidden>Свой цвет...</option>
                        </select>
                    </div>
                </div>
                <div class="setting-group">
                    <label for="lineThickness">Толщина <span class="val-badge" id="thickVal">1 px</span></label>
                    <input type="range" id="lineThickness" min="0.5" max="2" step="0.1" value="1">
                </div>
            </div>

            <div class="action-buttons">
                <div class="save-menu-wrapper">
                    <button class="btn-action neumo-btn btn-save-style" id="btn-save-menu">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2-2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        СОХРАНИТЬ
                    </button>
                    
                    <div id="save-dropdown" class="save-dropdown neumo-card">
                        <button class="dropdown-item" data-download="png">Сохранить как PNG</button>
                        <button class="dropdown-item" data-download="jpeg">Сохранить как JPEG</button>
                    </div>
                </div>

                <button class="btn-action btn-print-main neumo-btn-primary" id="btn-print">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    РАСПЕЧАТАТЬ
                </button>
            </div>
        </aside>

        <main class="preview-panel neumo-card">
            <div class="preview-sheet" id="previewSheet"></div>
        </main>

    </div>

    <script>
        (() => {
            document.addEventListener('DOMContentLoaded', () => {
                const els = {
                    paperSize: document.getElementById('paperSize'),
                    paperOrientation: document.getElementById('paperOrientation'),
                    type: document.getElementById('gridType'),
                    size: document.getElementById('gridSize'),
                    sizeGroup: document.getElementById('sizeGroup'),
                    sizeVal: document.getElementById('sizeVal'),
                    mT: document.getElementById('marginTop'),
                    mB: document.getElementById('marginBottom'),
                    mL: document.getElementById('marginLeft'),
                    mR: document.getElementById('marginRight'),
                    colorSelect: document.getElementById('lineColorSelect'),
                    customColor: document.getElementById('customColor'),
                    colorBadge: document.getElementById('colorValBadge'),
                    thick: document.getElementById('lineThickness'),
                    thickVal: document.getElementById('thickVal'),
                    sheet: document.getElementById('previewSheet')
                };

                const PX_TO_MM_RATIO = 0.264583;
                const dynamicStyle = document.createElement('style');
                document.head.appendChild(dynamicStyle);

                // Синхронизация цветов между select и color picker
                els.colorSelect.addEventListener('input', (e) => {
                    if (e.target.value) {
                        els.customColor.value = e.target.value;
                        els.colorBadge.textContent = e.target.value;
                    }
                });

                els.customColor.addEventListener('input', (e) => {
                    els.colorSelect.value = ''; // Переключаем на скрытую опцию "Свой цвет"
                    els.colorBadge.textContent = e.target.value;
                });

                els.type.addEventListener('change', (e) => {
                    const val = e.target.value;
                    if (val === 'wide') {
                        els.size.value = 8;
                    } else if (['narrow', 'slanted', 'frequent'].includes(val)) {
                        els.size.value = 11;
                    }
                    els.sizeVal.textContent = `${els.size.value} мм`;
                });

                function generateGrid() {
                    const paperOpt = els.paperSize.options[els.paperSize.selectedIndex];
                    let w = parseFloat(paperOpt.getAttribute('data-w'));
                    let h = parseFloat(paperOpt.getAttribute('data-h'));
                    
                    if (els.paperOrientation.value === 'landscape') {
                        [w, h] = [h, w];
                    }

                    const type = els.type.value;
                    const size = parseFloat(els.size.value);
                    const mT = parseFloat(els.mT.value) || 0;
                    const mB = parseFloat(els.mB.value) || 0;
                    const mL = parseFloat(els.mL.value) || 0;
                    const mR = parseFloat(els.mR.value) || 0;
                    const color = els.customColor.value; // Источник истины - цветовой picker
                    const thickPx = parseFloat(els.thick.value);
                    
                    const thickMm = (thickPx * PX_TO_MM_RATIO).toFixed(3);
                    els.thickVal.textContent = `${thickPx} px`;

                    if (type === 'millimeter') {
                        els.size.disabled = true;
                        els.sizeGroup.style.opacity = '0.5';
                        els.sizeVal.textContent = '1 мм (Фикс.)';
                    } else {
                        els.size.disabled = false;
                        els.sizeGroup.style.opacity = '1';
                        els.sizeVal.textContent = `${size} мм`;
                    }

                    els.sheet.style.width = '100%';
                    els.sheet.style.maxWidth = `${w}mm`;
                    els.sheet.style.aspectRatio = `${w} / ${h}`;

                    dynamicStyle.innerHTML = `
                        @media print {
                            @page { size: ${w}mm ${h}mm; margin: 0; }
                            .preview-sheet { 
                                width: ${w}mm !important; 
                                height: ${h}mm !important; 
                                max-width: none !important; 
                                aspect-ratio: auto !important; 
                            }
                        }
                    `;

                    let lines = '';

                    switch(type) {
                        case 'square':
                        case 'wide': {
                            for (let y = 0; y <= h; y += size) {
                                lines += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="${color}" stroke-width="${thickMm}" />`;
                            }
                            if (type === 'square') {
                                for (let x = 0; x <= w; x += size) {
                                    lines += `<line x1="${x}" y1="0" x2="${x}" y2="${h}" stroke="${color}" stroke-width="${thickMm}" />`;
                                }
                            }
                            break;
                        }
                        case 'narrow':
                        case 'slanted':
                        case 'frequent': {
                            const auxOffset = size * (15.5 / 48); 
                            
                            for (let y = 0; y <= h + size; y += size) {
                                lines += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="${color}" stroke-width="${thickMm}" />`;
                                if (y - auxOffset >= 0) {
                                    lines += `<line x1="0" y1="${y - auxOffset}" x2="${w}" y2="${y - auxOffset}" stroke="${color}" stroke-width="${thickMm}" />`;
                                }
                            }

                            if (type === 'slanted' || type === 'frequent') {
                                const slantSpace = type === 'frequent' ? size * (24 / 48) : size * (100 / 48);
                                const dx = h / Math.tan(65 * Math.PI / 180); 
                                
                                for (let x = -dx; x <= w + dx; x += slantSpace) {
                                    lines += `<line x1="${x + dx}" y1="0" x2="${x}" y2="${h}" stroke="${color}" stroke-width="${thickMm}" />`;
                                }
                            }
                            break;
                        }
                        case 'millimeter': {
                            const drawMillimeterLines = (limit, isVertical) => {
                                let result = '';
                                for (let i = 0; i <= limit; i += 1) {
                                    const is10 = (i % 10 === 0);
                                    const is5 = (i % 5 === 0 && !is10);
                                    const currentThick = is10 ? thickMm * 1.5 : (is5 ? thickMm : thickMm * 0.4);
                                    const opacity = is10 ? 1 : (is5 ? 0.7 : 0.3);
                                    
                                    if (isVertical) {
                                        result += `<line x1="${i}" y1="0" x2="${i}" y2="${h}" stroke="${color}" stroke-width="${currentThick}" opacity="${opacity}" />`;
                                    } else {
                                        result += `<line x1="0" y1="${i}" x2="${w}" y2="${i}" stroke="${color}" stroke-width="${currentThick}" opacity="${opacity}" />`;
                                    }
                                }
                                return result;
                            };
                            lines += drawMillimeterLines(w, true) + drawMillimeterLines(h, false);
                            break;
                        }
                        case 'isometric': {
                            const hStep = size * (Math.sqrt(3) / 2);
                            for (let y = 0; y <= h; y += hStep) {
                                lines += `<line x1="0" y1="${y}" x2="${w}" y2="${y}" stroke="${color}" stroke-width="${thickMm}" />`;
                            }
                            const dxIso = h / Math.tan(60 * Math.PI / 180);
                            for (let x = -dxIso; x <= w + dxIso; x += size) {
                                lines += `<line x1="${x + dxIso}" y1="0" x2="${x}" y2="${h}" stroke="${color}" stroke-width="${thickMm}" />`;
                                lines += `<line x1="${x - dxIso}" y1="0" x2="${x}" y2="${h}" stroke="${color}" stroke-width="${thickMm}" />`;
                            }
                            break;
                        }
                        case 'dots': {
                            for (let y = 0; y <= h; y += size) {
                                for (let x = 0; x <= w; x += size) {
                                    lines += `<circle cx="${x}" cy="${y}" r="${thickMm}" fill="${color}" stroke="none" />`;
                                }
                            }
                            break;
                        }
                    }

                    els.sheet.innerHTML = `
                        <svg width="100%" height="100%" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <clipPath id="printArea">
                                    <rect x="${mL}" y="${mT}" width="${Math.max(0, w - mL - mR)}" height="${Math.max(0, h - mT - mB)}" />
                                </clipPath>
                            </defs>
                            <g clip-path="url(#printArea)">
                                ${lines}
                            </g>
                        </svg>
                    `;
                }

                let timeout;
                function generateGridDebounced() {
                    clearTimeout(timeout);
                    timeout = setTimeout(generateGrid, 15);
                }

                document.querySelectorAll('.settings-panel input, .settings-panel select').forEach(el => {
                    el.addEventListener('input', generateGridDebounced);
                });

                const btnSaveMenu = document.getElementById('btn-save-menu');
                const saveDropdown = document.getElementById('save-dropdown');

                btnSaveMenu.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveDropdown.style.display = saveDropdown.style.display === 'block' ? 'none' : 'block';
                });

                document.addEventListener('click', () => {
                    saveDropdown.style.display = 'none';
                });

                document.getElementById('btn-print').addEventListener('click', () => {
                    window.print();
                });

                function downloadImage(format) {
                    saveDropdown.style.display = 'none';
                    
                    const svgElement = document.querySelector('.preview-sheet svg');
                    if (!svgElement) return;

                    const serializer = new XMLSerializer();
                    const svgString = serializer.serializeToString(svgElement);
                    
                    const paperOpt = els.paperSize.options[els.paperSize.selectedIndex];
                    let w = parseFloat(paperOpt.getAttribute('data-w'));
                    let h = parseFloat(paperOpt.getAttribute('data-h'));
                    
                    if (els.paperOrientation.value === 'landscape') {
                        [w, h] = [h, w];
                    }
                    
                    const scale = 5; 
                    const canvas = document.createElement('canvas');
                    canvas.width = w * scale;
                    canvas.height = h * scale;
                    const ctx = canvas.getContext('2d');
                    
                    if (format === 'jpeg') {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }

                    const img = new Image();
                    const svgBlob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
                    const url = URL.createObjectURL(svgBlob);

                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        URL.revokeObjectURL(url);
                        
                        const link = document.createElement('a');
                        const mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
                        const extension = format === 'jpeg' ? 'jpg' : 'png';
                        
                        link.download = `tochilka_template.${extension}`;
                        link.href = canvas.toDataURL(mimeType, 1.0); 
                        link.click();
                    };
                    img.src = url;
                }

                document.querySelectorAll('[data-download]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        downloadImage(e.target.getAttribute('data-download'));
                    });
                });

                generateGrid();
            });
        })();
    </script>
</body>
</html>
